<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Drama House — Admin Panel</title>
<link rel="stylesheet" href="admin.css" />
</head>
<body>

<div id="login-view" class="view">
  <div class="login-box">
    <h2>Admin Login</h2>
    <input type="password" id="password-input" placeholder="পাসওয়ার্ড" />
    <button id="login-btn">লগইন</button>
    <p id="login-error" class="error hidden"></p>
  </div>
</div>

<div id="dashboard-view" class="view hidden">
  <header class="admin-header">
    <h2>Drama House Admin</h2>
    <button id="logout-btn" class="secondary-btn">লগআউট</button>
  </header>

  <section class="stats-row">
    <div class="stat-card"><span id="stat-users">-</span><small>ইউজার</small></div>
    <div class="stat-card"><span id="stat-videos">-</span><small>ভিডিও</small></div>
  </section>

  <section class="panel">
    <h3>নতুন ভিডিও যোগ করুন</h3>
    <form id="video-form">
      <input type="text" id="video-title" placeholder="ভিডিওর টাইটেল" required />
      <input type="file" id="video-thumbnail" accept="image/*" required />
      <button type="submit">এন্ট্রি তৈরি করুন</button>
    </form>
    <div id="video-instruction" class="instruction hidden"></div>
  </section>

  <section class="panel">
    <h3>সব ভিডিও</h3>
    <table class="video-table">
      <thead><tr><th>টাইটেল</th><th>স্ট্যাটাস</th><th>কোড</th></tr></thead>
      <tbody id="video-table-body"></tbody>
    </table>
  </section>

  <section class="panel">
    <h3>সব ইউজারকে মেসেজ পাঠান (Broadcast)</h3>
    <form id="broadcast-form">
      <textarea id="broadcast-text" placeholder="মেসেজ লিখুন..."></textarea>
      <input type="file" id="broadcast-image" accept="image/*" />
      <button type="submit">পাঠান</button>
    </form>
    <div id="broadcast-result" class="instruction hidden"></div>
  </section>
</div>

<script src="admin.js"></script>
</body>
</html>
